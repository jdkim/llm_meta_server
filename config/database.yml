# PostgreSQL. Versions 12 and up are supported.
#
#   Install the pg driver:    gem install pg
#   In the Gemfile:            gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  # Unix-socket Postgres on the same host: leave host empty so libpq
  # uses /var/run/postgresql/.s.PGSQL.5432 with peer auth. For TCP,
  # set DATABASE_URL or DB_HOST/DB_PORT/DB_USER/DB_PASSWORD.
  host: <%= ENV.fetch("DB_HOST", "") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>
  username: <%= ENV.fetch("DB_USER", ENV.fetch("USER", "postgres")) %>
  password: <%= ENV.fetch("DB_PASSWORD", "") %>

development:
  <<: *default
  database: llm_meta_server_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: llm_meta_server_test

# In Kamal-deployed production, DATABASE_URL is injected by the
# postgres accessory and overrides the keys above.
production:
  <<: *default
  database: llm_meta_server_production
  url: <%= ENV.fetch("DATABASE_URL", nil) %>
