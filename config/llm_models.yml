# LLM catalog — single source of truth for which models the server exposes.
#
# Schema per entry:
#   meta_id:                     # URL-safe ID (no dots/colons). Used in URLs + favorites.
#     api_id:         <string>   # Real provider model ID (with dots/colons).
#     display_name:   <string>   # UI label.
#     supports_vision: <bool>    # Optional. Defaults to false. Set true for vision-capable models.
#     supports_tools:  <bool>    # Optional. Defaults to false. Set true for tool/function-calling models.
#     kind:           <symbol>   # Optional. `image` for image-generation models.
#     endpoint:       <string>   # Optional. `responses` routes OpenAI through llm.responses.create.
#     defaults:       <hash>     # Optional. Per-request kwargs merged UNDER user params.
#     pricing:                   # REQUIRED for chargeable models (skip for ollama and kind: image).
#       input:      <float>      # USD per 1M input tokens.
#       output:     <float>      # USD per 1M output tokens.
#       reviewed_at: <YYYY-MM-DD> # When these values were last verified against the provider's pricing page.
#
# To add/remove a model: edit this file and restart the server. No Ruby change.
# To validate the catalog: bin/rails models:validate

openai:
  gpt-5-5-pro:
    api_id: gpt-5.5-pro
    display_name: GPT-5.5 Pro
    supports_vision: true
    supports_tools: true
    # PROVISIONAL pricing — verify against openai.com/api/pricing.
    # WebFetch was blocked at review time; using a pro-tier premium
    # over gpt-5.5 based on OpenAI's historical Pro pricing multiplier.
    endpoint: responses
    defaults:
      reasoning:
        summary: auto
    pricing:
      input: 5.00
      output: 40.00
      reviewed_at: 2026-07-21
  gpt-5-5:
    api_id: gpt-5.5
    display_name: GPT-5.5
    supports_vision: true
    supports_tools: true
    # PROVISIONAL pricing — verify against openai.com/api/pricing.
    endpoint: responses
    defaults:
      reasoning:
        summary: auto
    pricing:
      input: 1.50
      output: 12.00
      reviewed_at: 2026-07-21
  gpt-5:
    api_id: gpt-5
    display_name: GPT-5
    supports_vision: true
    supports_tools: true
    # GPT-5 reasoning is only surfaced via the Responses API (the chat
    # completions endpoint hides it). LlmRbFacade routes streaming
    # no-tools / no-image requests through llm.responses.create for any
    # model with `endpoint: responses`; everything else falls back to
    # chat completions.
    endpoint: responses
    defaults:
      reasoning:
        summary: auto
    pricing:
      input: 1.25
      output: 10.00
      reviewed_at: 2026-06-08
  gpt-5-4-mini:
    api_id: gpt-5.4-mini
    display_name: GPT-5.4 Mini
    supports_vision: true
    supports_tools: true
    # PROVISIONAL pricing — verify against openai.com/api/pricing.
    endpoint: responses
    defaults:
      reasoning:
        summary: auto
    pricing:
      input: 0.25
      output: 2.00
      reviewed_at: 2026-07-21
  gpt-5-mini:
    api_id: gpt-5-mini
    display_name: GPT-5 Mini
    supports_vision: true
    supports_tools: true
    endpoint: responses
    defaults:
      reasoning:
        summary: auto
    pricing:
      input: 0.25
      output: 2.00
      reviewed_at: 2026-06-08
  gpt-image-1:
    api_id: gpt-image-1
    display_name: GPT Image 1
    kind: image
    supports_vision: true
    # kind: image → billed per-image by OpenAI, not per-token.
    # No pricing block; per-image cost integration is pending.

anthropic:
  claude-fable-5:
    api_id: claude-fable-5
    display_name: Claude Fable 5
    supports_vision: true
    supports_tools: true
    # Anthropic's premium tier — priced above Opus. Uses the newer
    # tokenizer (~30% more tokens for the same text). If Fable rejects
    # adaptive thinking, drop the defaults block.
    defaults:
      thinking:
        type: adaptive
    pricing:
      input: 10.00
      output: 50.00
      reviewed_at: 2026-07-21
  claude-opus-4-8:
    api_id: claude-opus-4-8
    display_name: Claude Opus 4.8
    supports_vision: true
    supports_tools: true
    defaults:
      thinking:
        type: adaptive
    pricing:
      input: 5.00
      output: 25.00
      reviewed_at: 2026-07-21
  claude-opus-4-7:
    api_id: claude-opus-4-7
    display_name: Claude Opus 4.7
    supports_vision: true
    supports_tools: true
    # Opus 4.7 accepts `adaptive` thinking but emits no thinking_delta
    # events (internal-only reasoning) — the Reasoning block in the UI
    # will stay empty. Still requesting adaptive so users can force more
    # reasoning via {output_config: {effort: "high"}} in Settings.
    defaults:
      thinking:
        type: adaptive
    # Price reduced by Anthropic from $15/$75 to $5/$25 (verified 2026-07-21).
    pricing:
      input: 5.00
      output: 25.00
      reviewed_at: 2026-07-21
  claude-sonnet-5:
    api_id: claude-sonnet-5
    display_name: Claude Sonnet 5
    supports_vision: true
    supports_tools: true
    defaults:
      thinking:
        type: adaptive
    # Introductory pricing through Aug 31, 2026 ($2/$10); standard $3/$15
    # begins Sep 1, 2026 — bump reviewed_at + pricing then.
    pricing:
      input: 2.00
      output: 10.00
      reviewed_at: 2026-07-21
  claude-sonnet-4-6:
    api_id: claude-sonnet-4-6
    display_name: Claude Sonnet 4.6
    supports_vision: true
    supports_tools: true
    # Sonnet 4.6 exposes thinking_delta events in adaptive mode.
    defaults:
      thinking:
        type: adaptive
    pricing:
      input: 3.00
      output: 15.00
      reviewed_at: 2026-06-08
  claude-haiku-4-5:
    api_id: claude-haiku-4-5
    display_name: Claude Haiku 4.5
    supports_vision: true
    supports_tools: true
    # Haiku 4.5 rejects `adaptive` ("adaptive thinking is not supported
    # on this model"). No thinking default declared — Haiku just answers
    # directly. If a `thinking.type: "enabled"` shape is confirmed
    # working on Haiku, add it here.
    pricing:
      input: 1.00
      output: 5.00
      reviewed_at: 2026-06-08

