ollama:
  # Every Ollama model here sets `options.num_ctx: 32768`. Ollama's own
  # default is 2048 tokens — dramatically undersized once you factor in a
  # few conversation turns, tool schemas, or non-English (which uses more
  # tokens per character). Silent front-truncation manifested as
  # repetition-loop babble and 5-minute read-timeouts. 32K covers realistic
  # multi-turn tool-using chats; bump higher only if the host has spare KV
  # cache VRAM.
  #
  # Ollama models run locally → no `pricing` block (always $0).
  qwen3-6-35b-fast:
    api_id: qwen3.6:35b-fast
    display_name: qwen3.6:35b-fast
    supports_vision: true
    supports_tools: true
    # qwen3.6 ignores the SYSTEM /no_think text directive; only the API-level
    # think: false actually disables reasoning on this model. Users can still
    # override per-request via the Settings panel.
    defaults:
      think: false
      options:
        num_ctx: 32768
  qwen3-6-35b:
    api_id: qwen3.6:35b
    display_name: qwen3.6:35b
    supports_vision: true
    supports_tools: true
    defaults:
      options:
        num_ctx: 32768
  medgemma1-5-4b:
    api_id: medgemma1.5:4b
    display_name: medgemma1.5:4b
    supports_vision: true
    # Ollama does not register MedGemma as a thinking-capable model
    # (passing `think:` either way returns "does not support thinking"),
    # but the model still emits `<unused94>...<unused95>` blocks inline.
    # If that becomes a problem, strip those tokens response-side rather
    # than via the API.
    defaults:
      options:
        num_ctx: 32768
