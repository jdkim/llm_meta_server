# LLM catalog — single source of truth for which models the server exposes.
#
# Schema per entry:
#   meta_id:                     # URL-safe ID (no dots/colons). Used in URLs + favorites.
#     api_id:         <string>   # Real provider model ID (with dots/colons).
#     display_name:   <string>   # UI label.
#     supports_vision: <bool>    # Optional. Defaults to false. Set true for vision-capable models.
#     supports_tools:  <bool>    # Optional. Defaults to false. Set true for tool/function-calling models.
#     kind:           <symbol>   # Optional. `image` for image-generation models.
#
# To add/remove a model: edit this file and restart the server. No Ruby change.

openai:
  gpt-5:
    api_id: gpt-5
    display_name: GPT-5
    supports_vision: true
    supports_tools: true
    # GPT-5 reasoning is only surfaced via the Responses API (the chat
    # completions endpoint hides it). LlmRbFacade routes streaming
    # no-tools / no-image requests through llm.responses.create for any
    # model with `endpoint: responses`; everything else falls back to
    # chat completions.
    endpoint: responses
    defaults:
      reasoning:
        summary: auto
  gpt-5-mini:
    api_id: gpt-5-mini
    display_name: GPT-5 Mini
    supports_vision: true
    supports_tools: true
    endpoint: responses
    defaults:
      reasoning:
        summary: auto

anthropic:
  claude-opus-4-7:
    api_id: claude-opus-4-7
    display_name: Claude Opus 4.7
    supports_vision: true
    supports_tools: true
    # Opus 4.7 accepts `adaptive` thinking but emits no thinking_delta
    # events (internal-only reasoning) — the Reasoning block in the UI
    # will stay empty. Still requesting adaptive so users can force more
    # reasoning via {output_config: {effort: "high"}} in Settings.
    defaults:
      thinking:
        type: adaptive
  claude-sonnet-4-6:
    api_id: claude-sonnet-4-6
    display_name: Claude Sonnet 4.6
    supports_vision: true
    supports_tools: true
    # Sonnet 4.6 exposes thinking_delta events in adaptive mode.
    defaults:
      thinking:
        type: adaptive
  claude-haiku-4-5:
    api_id: claude-haiku-4-5
    display_name: Claude Haiku 4.5
    supports_vision: true
    supports_tools: true
    # Haiku 4.5 rejects `adaptive` ("adaptive thinking is not supported
    # on this model"). No thinking default declared — Haiku just answers
    # directly. If a `thinking.type: "enabled"` shape is confirmed
    # working on Haiku, add it here.

google:
  gemini-3-1-pro:
    api_id: gemini-3.1-pro-preview
    display_name: Gemini 3.1 Pro
    supports_vision: true
    supports_tools: true
  gemini-3-flash:
    api_id: gemini-3-flash-preview
    display_name: Gemini 3 Flash
    supports_vision: true
    supports_tools: true
  gemini-2-5-pro:
    api_id: gemini-2.5-pro
    display_name: Gemini 2.5 Pro
    supports_vision: true
    supports_tools: true
  gemini-3-1-flash-image:
    api_id: gemini-3.1-flash-image-preview
    display_name: Gemini 3.1 Flash Image (Nano Banana 2)
    kind: image
    supports_vision: true
  gemini-3-pro-image:
