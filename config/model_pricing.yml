# Per-model pricing in USD per 1 million tokens.
# Keyed by (llm_type, meta_id) — same identifiers as config/llm_models.yml.
#
# Last reviewed: 2026-06-08 — STARTER values. Verify against current
# provider pricing pages before relying on for billing:
#   OpenAI:    https://openai.com/api/pricing
#   Anthropic: https://www.anthropic.com/pricing#api
#   Google:    https://ai.google.dev/pricing
#
# Notes:
# - Thinking-mode tokens are billed by providers as part of output_tokens
#   (Anthropic) or as separate reasoning_tokens (OpenAI). MVP folds them
#   into output cost at the standard output rate — slight under-charge
#   on reasoning-heavy turns. Fix in v2 if it matters.
# - Image-generation models (kind: image) bill per-image, not per-token.
#   They are absent from this table; shared-key flow should skip them
#   until per-image cost is integrated.
# - Ollama models run locally — cost is always $0.

openai:
  gpt-5:
    input: 1.25
    output: 10.00
  gpt-5-mini:
    input: 0.25
    output: 2.00

anthropic:
  claude-opus-4-7:
    input: 15.00
    output: 75.00
  claude-sonnet-4-6:
    input: 3.00
    output: 15.00
  claude-haiku-4-5:
    input: 1.00
    output: 5.00

google:
  # Gemini 3.x are preview-tier — pricing is provisional, verify at GA.
  gemini-3-1-pro:
    input: 1.25
    output: 10.00
  gemini-3-flash:
    input: 0.30
    output: 2.50
  gemini-2-5-pro:
    input: 1.25
    output: 10.00

ollama:
  qwen3-6-35b-fast: { input: 0.0, output: 0.0 }
  qwen3-6-35b:      { input: 0.0, output: 0.0 }
  medgemma1-5-4b:   { input: 0.0, output: 0.0 }
